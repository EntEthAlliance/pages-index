name: Build & Deploy Pages Index

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Monthly refresh (1st of month, 03:30 UTC)
    - cron: "30 3 1 * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: EntEthAlliance
          EXCLUDE_REPO: EntEthAlliance/EntEthAlliance.github.io
          DAYS_ACTIVE: "183"
          OUT_DIR: dist
        run: |
          python3 scripts/generate.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
